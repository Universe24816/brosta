<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブロスタ風サッカー</title>
<style>
body {
  margin: 0;
  background: #2ecc71;
  overflow: hidden;
  font-family: sans-serif;
}
#game {
  display: block;
  margin: auto;
  background: #27ae60;
}
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 20px;
}
#shootBtn {
  position: absolute;
  bottom: 30px;
  right: 30px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: red;
  color: white;
  font-size: 20px;
  border: none;
}
</style>
</head>
<body>

<div id="ui">0 - 0</div>
<canvas id="game" width="800" height="500"></canvas>
<button id="shootBtn">SHOOT</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 100, y: 250, r: 15, speed: 3 };
let enemy = { x: 700, y: 250, r: 15, speed: 2 };
let ball = { x: 400, y: 250, r: 10, vx: 0, vy: 0 };

let scoreA = 0;
let scoreB = 0;

let keys = {};
let touch = null;

// キー操作
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// タッチ操作
canvas.addEventListener("touchmove", e => {
  const rect = canvas.getBoundingClientRect();
  touch = {
    x: e.touches[0].clientX - rect.left,
    y: e.touches[0].clientY - rect.top
  };
});

// シュート
document.getElementById("shootBtn").onclick = () => shoot();

function shoot() {
  let dx = ball.x - player.x;
  let dy = ball.y - player.y;
  let dist = Math.hypot(dx, dy);

  if (dist < 40) {
    ball.vx = dx * 0.3;
    ball.vy = dy * 0.3;
  }
}

// プレイヤー移動
function movePlayer() {
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;

  if (touch) {
    player.x += (touch.x - player.x) * 0.1;
    player.y += (touch.y - player.y) * 0.1;
  }

  clamp(player);
}

// 敵AI
function moveEnemy() {
  let dx = ball.x - enemy.x;
  let dy = ball.y - enemy.y;

  enemy.x += dx * 0.02;
  enemy.y += dy * 0.02;

  // ボール蹴る
  let dist = Math.hypot(dx, dy);
  if (dist < 30) {
    ball.vx = dx * 0.2;
    ball.vy = dy * 0.2;
  }
}

// ボール
function moveBall() {
  ball.x += ball.vx;
  ball.y += ball.vy;

  ball.vx *= 0.98;
  ball.vy *= 0.98;

  // 壁反射
  if (ball.y < 0 || ball.y > canvas.height) ball.vy *= -1;

  // ゴール判定
  if (ball.x < 0 && ball.y > 180 && ball.y < 320) {
    scoreB++;
    reset();
  }
  if (ball.x > canvas.width && ball.y > 180 && ball.y < 320) {
    scoreA++;
    reset();
  }

  // 壁
  if (ball.x < 0 || ball.x > canvas.width) ball.vx *= -1;
}

// 初期化
function reset() {
  ball.x = 400;
  ball.y = 250;
  ball.vx = 0;
  ball.vy = 0;
}

// 範囲制限
function clamp(p) {
  p.x = Math.max(p.r, Math.min(canvas.width - p.r, p.x));
  p.y = Math.max(p.r, Math.min(canvas.height - p.r, p.y));
}

// 描画
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // フィールド
  ctx.fillStyle = "#2ecc71";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ゴール
  ctx.fillStyle = "white";
  ctx.fillRect(0, 180, 10, 140);
  ctx.fillRect(790, 180, 10, 140);

  // プレイヤー
  ctx.fillStyle = "blue";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
  ctx.fill();

  // 敵
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2);
  ctx.fill();

  // ボール
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();

  document.getElementById("ui").innerText = `${scoreA} - ${scoreB}`;
}

// ループ
function update() {
  movePlayer();
  moveEnemy();
  moveBall();
  draw();
  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
