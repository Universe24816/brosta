<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブロスタ風・進化版</title>
<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:sans-serif;text-align:center}
canvas{background:#18222d;display:block;margin:10px auto;border:3px solid #333;touch-action:none}
#modeSelect{margin:10px}
button{padding:10px 20px;margin:5px;border:none;border-radius:10px;background:#00c8ff;color:#000;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<h2>🎮 ブロスタ風・進化版</h2>
<div id="modeSelect">
<button onclick="startGame('battle')">バトル</button>
<button onclick="startGame('survival')">サバイバル</button>
</div>
<canvas id="game" width="600" height="400"></canvas>

<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");
let mode="battle";

let player, enemies, bullets;
let moveTouch=null, aimTouch=null;

function startGame(m){
 mode=m;
 player={x:300,y:200,size:15,hp:100};
 enemies=[{x:500,y:200,size:15,hp:100}];
 bullets=[];
}
startGame("battle");

// タッチ操作
c.addEventListener("touchstart",e=>{
 for(let t of e.touches){
  if(t.clientX < window.innerWidth/2) moveTouch=t.identifier;
  else aimTouch=t.identifier;
 }
});

c.addEventListener("touchmove",e=>{
 for(let t of e.touches){
  let rect=c.getBoundingClientRect();
  let x=t.clientX-rect.left;
  let y=t.clientY-rect.top;

  if(t.identifier===moveTouch){
    player.x=x;
    player.y=y;
  }
  if(t.identifier===aimTouch){
    shoot(player,{x,y});
  }
 }
});

c.addEventListener("touchend",()=>{
 moveTouch=null; aimTouch=null;
});

function shoot(shooter,target){
 let dx=target.x-shooter.x,dy=target.y-shooter.y,d=Math.hypot(dx,dy);
 bullets.push({x:shooter.x,y:shooter.y,dx:dx/d*6,dy:dy/d*6,owner:shooter});
}

function update(){
 if(mode==="battle"){
  let enemy=enemies[0];
  let dx=player.x-enemy.x,dy=player.y-enemy.y,d=Math.hypot(dx,dy);
  enemy.x+=dx/d*1.2;
  enemy.y+=dy/d*1.2;
  if(Math.random()<0.03)shoot(enemy,player);
 }

 if(mode==="survival"){
  if(Math.random()<0.02){
    enemies.push({x:Math.random()*600,y:Math.random()*400,size:12,hp:20});
  }
  enemies.forEach(e=>{
    let dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);
    e.x+=dx/d*1.5; e.y+=dy/d*1.5;
  });
 }

 bullets.forEach((b,bi)=>{
  b.x+=b.dx; b.y+=b.dy;
  enemies.forEach((e,ei)=>{
    if(Math.hypot(b.x-e.x,b.y-e.y)<e.size){
      e.hp-=10;
      bullets.splice(bi,1);
      if(e.hp<=0) enemies.splice(ei,1);
    }
  });
 });

 enemies.forEach(e=>{
  if(Math.hypot(player.x-e.x,player.y-e.y)<e.size){
    player.hp-=0.2;
  }
 });

 if(player.hp<=0){alert("ゲームオーバー");startGame(mode);}
}

function draw(){
 ctx.clearRect(0,0,600,400);

 // プレイヤー
 ctx.fillStyle="#00c8ff";
 ctx.beginPath();ctx.arc(player.x,player.y,player.size,0,6.28);ctx.fill();

 // 敵
 ctx.fillStyle="#ff3b3b";
 enemies.forEach(e=>{
  ctx.beginPath();ctx.arc(e.x,e.y,e.size,0,6.28);ctx.fill();
 });

 // 弾
 ctx.fillStyle="#ffd700";
 bullets.forEach(b=>{
  ctx.beginPath();ctx.arc(b.x,b.y,4,0,6.28);ctx.fill();
 });
}

function loop(){update();draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
